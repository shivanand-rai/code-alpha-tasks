<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Image Gallery</h1>

<!-- Filter Buttons -->
<div class="filters">
  <button onclick="filterImages('all')">All</button>
  <button onclick="filterImages('nature')">Nature</button>
  <button onclick="filterImages('city')">City</button>
</div>

<!-- Gallery -->
<div class="gallery">
  <img src="https://picsum.photos/id/1015/300/200" class="nature" onclick="openLightbox(0)">
  <img src="https://picsum.photos/id/1011/300/200" class="nature" onclick="openLightbox(1)">
  <img src="https://picsum.photos/id/1012/300/200" class="city" onclick="openLightbox(2)">
  <img src="https://picsum.photos/id/1016/300/200" class="city" onclick="openLightbox(3)">
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
  <span class="close" onclick="closeLightbox()">×</span>
  <img id="lightbox-img">
  <button class="prev" onclick="changeSlide(-1)">❮</button>
  <button class="next" onclick="changeSlide(1)">❯</button>
</div>

<script src="script.js"></script>
</body>
</html>
